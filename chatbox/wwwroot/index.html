<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyChatbox</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chat-container {
      width: 100%;
      max-width: 780px;
      height: 100vh;
      background: #fff;
      display: flex;
      flex-direction: column;
      box-shadow: 0 2px 24px rgba(0,0,0,0.10);
    }

    /* ── Header ── */
    .chat-header {
      padding: 14px 20px;
      background: #1a73e8;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .header-avatar {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .header-info h2 { font-size: 16px; font-weight: 600; }
    .header-info p  { font-size: 12px; opacity: 0.75; margin-top: 2px; }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .welcome {
      margin: auto;
      text-align: center;
      color: #9aa0a6;
      font-size: 14px;
      line-height: 1.6;
    }

    .message {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 78%;
    }

    .message.user      { align-self: flex-end;   flex-direction: row-reverse; }
    .message.assistant { align-self: flex-start; }
    .message.error     { align-self: flex-start; }

    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .message.user      .msg-avatar { background: #1a73e8; color: #fff; }
    .message.assistant .msg-avatar { background: #e8f0fe; }
    .message.error     .msg-avatar { background: #fce8e6; }

    .msg-bubble {
      padding: 10px 15px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user      .msg-bubble { background: #1a73e8; color: #fff; border-bottom-right-radius: 4px; }
    .message.assistant .msg-bubble { background: #f1f3f4; color: #202124; border-bottom-left-radius: 4px; }
    .message.error     .msg-bubble { background: #fce8e6; color: #c5221f; border-bottom-left-radius: 4px; }

    /* ── Typing indicator ── */
    .typing-bubble {
      padding: 12px 16px;
      background: #f1f3f4;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-bubble span {
      width: 7px; height: 7px;
      background: #9aa0a6;
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-7px); }
    }

    /* ── Input bar ── */
    .input-bar {
      padding: 14px 16px;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: #fff;
      flex-shrink: 0;
    }

    .input-bar textarea {
      flex: 1;
      border: 1.5px solid #dadce0;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.15s;
      overflow-y: auto;
    }

    .input-bar textarea:focus { border-color: #1a73e8; }

    .send-btn {
      width: 44px; height: 44px;
      background: #1a73e8;
      border: none;
      border-radius: 50%;
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    .send-btn:hover:not(:disabled) { background: #1557b0; transform: scale(1.05); }
    .send-btn:disabled { background: #dadce0; cursor: not-allowed; }
    .send-btn svg { width: 20px; height: 20px; }
  </style>
</head>
<body>
  <div class="chat-container">

    <header class="chat-header">
      <div class="header-avatar">🤖</div>
      <div class="header-info">
        <h2>MyChatbox</h2>
        <p>Azure AI Agent</p>
      </div>
    </header>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <p>Send a message to start chatting.</p>
      </div>
    </div>

    <div class="input-bar">
      <textarea id="input" rows="1" placeholder="Type a message…"></textarea>
      <button class="send-btn" id="sendBtn" title="Send" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>

  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('input');
    const sendBtn    = document.getElementById('sendBtn');
    const sessionKey = 'chatbox-session-id';
    const newSessionId = () => (window.crypto && crypto.randomUUID)
      ? crypto.randomUUID()
      : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    let sessionId = localStorage.getItem(sessionKey) || newSessionId();
    localStorage.setItem(sessionKey, sessionId);
    let busy = false;

    // Enter sends; Shift+Enter inserts newline
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    // Auto-grow textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function appendMessage(text, role) {
      document.getElementById('welcome')?.remove();

      const avatarEmoji = role === 'user' ? '👤' : role === 'error' ? '⚠️' : '🤖';
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.innerHTML = `
        <div class="msg-avatar">${avatarEmoji}</div>
        <div class="msg-bubble">${escapeHtml(text)}</div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.id = 'typing';
      div.innerHTML = `
        <div class="msg-avatar">🤖</div>
        <div class="typing-bubble"><span></span><span></span><span></span></div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() { document.getElementById('typing')?.remove(); }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || busy) return;

      busy = true;
      sendBtn.disabled = true;
      inputEl.value = '';
      inputEl.style.height = 'auto';

      appendMessage(text, 'user');
      showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, sessionId })
        });

        removeTyping();

        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
          appendMessage(err.error ?? 'Something went wrong.', 'error');
        } else {
          const data = await res.json();
          if (data.sessionId && typeof data.sessionId === 'string') {
            sessionId = data.sessionId;
            localStorage.setItem(sessionKey, sessionId);
          }
          appendMessage(data.reply, 'assistant');
        }
      } catch {
        removeTyping();
        appendMessage('Could not reach the server. Make sure the app is running.', 'error');
      } finally {
        busy = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }
  </script>
</body>
</html>
